name: split_bill_app
description: A Flutter app for splitting restaurant bills with ticket scanning and sharing functionality.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  flutter_local_notifications: 16.3.2
  animations: ^2.0.11
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.0
  share_plus: ^7.0.0
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
